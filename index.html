<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YNA Studio</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f7f7f7;
margin:0;
padding:0;
text-align:center;
}

header{
background:black;
color:white;
padding:20px;
font-size:28px;
letter-spacing:2px;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:35px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.product:hover{
transform:translateY(-5px);
}

.product img{
width:100%;
border-radius:6px;
}

.name{
font-size:18px;
margin-top:10px;
}

.price{
font-weight:bold;
color:#444;
margin-bottom:10px;
}

.colors{
display:flex;
justify-content:center;
gap:8px;
margin-top:5px;
}

.colors img{
width:35px;
height:35px;
border-radius:4px;
object-fit:cover;
border:1px solid #ddd;
}

footer{
margin-top:40px;
padding:20px;
background:#111;
color:white;
font-size:14px;
}

</style>
</head>


<body>

<header>
YNA STUDIO
</header>


<div class="container">

<div class="products">


<!-- Closed Heels -->
<div class="product">

<img src="closed-heels.jpg">

<p class="name">Closed Heels</p>
<p class="price">725 PHP</p>

<div class="colors">
<img src="closed-heels-white.jpg">
<img src="closed-heels-black.jpg">
<img src="closed-heels-beige.jpg">
</div>

</div>



<!-- Knotted Mules -->
<div class="product">

<img src="knotted-mules.jpg">

<p class="name">Knotted Mules</p>
<p class="price">725 PHP</p>

<div class="colors">
<img src="knotted-mules-red.jpg">
<img src="knotted-mules-black.jpg">
<img src="knotted-mules-nude.jpg">
</div>

</div>



<!-- Closed Heeled Mule -->
<div class="product">

<img src="closed-heeled-mule.jpg">

<p class="name">Closed-Heeled Mule</p>
<p class="price">749 PHP</p>

<div class="colors">
<img src="closed-heeled-mule-black.jpg">
<img src="closed-heeled-mule-red.jpg">
</div>

</div>



<!-- Open Toe Heels -->
<div class="product">

<img src="open-toe-heels.jpg">

<p class="name">Open-Toe Heels</p>
<p class="price">715 PHP</p>

<div class="colors">
<img src="open-toe-heels-beige.jpg">
<img src="open-toe-heels-black.jpg">
<img src="open-toe-heels-red.jpg">
</div>

</div>



<!-- Mary Jane Shoes -->
<div class="product">

<img src="mary-jane-shoes.jpg">

<p class="name">Mary Jane Shoes</p>
<p class="price">705 PHP</p>

<div class="colors">
<img src="mary-jane-black.jpg">
<img src="mary-jane-white.jpg">
<img src="mary-jane-red.jpg">
</div>

</div>



</div>
</div>


<footer>
Crafted in Vietnam, Worn with Filipina Confidence
</footer>

</body>
</html>
